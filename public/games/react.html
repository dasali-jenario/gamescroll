<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Green Flash</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #22223b; touch-action: manipulation; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed; top: 4.5rem; left: 0; right: 0; text-align: center;
      font: 800 2rem "Segoe UI", sans-serif; color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,.4); pointer-events: none;
    }
    .banner {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: rgba(15,20,25,.35); color: #fff; font: 600 1rem "Segoe UI", sans-serif;
      text-align: center; padding: 1rem;
    }
    .banner.hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud" id="score">0</div>
  <div class="banner" id="banner">Tap to start<br/><small>Only tap when green</small></div>
  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')
    const scoreEl = document.getElementById('score')
    const banner = document.getElementById('banner')
    const dpr = Math.min(devicePixelRatio || 1, 2)
    let W = 0, H = 0, running = false, score = 0, lives = 3
    let phase = 'wait', timer = 1, ready = false, flash = 0

    function resize() {
      W = innerWidth; H = innerHeight
      canvas.width = W * dpr; canvas.height = H * dpr
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
    }

    function reset() {
      score = 0; lives = 3; scoreEl.textContent = '0'
      phase = 'wait'; timer = 1.1; ready = false; flash = 0
    }

    function onTap() {
      if (!running) {
        running = true
        banner.classList.add('hidden')
        reset()
        return
      }
      if (lives <= 0) {
        reset()
        banner.classList.add('hidden')
        return
      }
      if (ready) {
        score++
        scoreEl.textContent = String(score)
        ready = false
        phase = 'wait'
        timer = 0.7 + Math.random() * 1.3
        flash = 1
      } else {
        lives--
        flash = -1
        if (lives <= 0) {
          banner.innerHTML = `Score ${score}<br/><small>Tap to retry</small>`
          banner.classList.remove('hidden')
        }
      }
    }

    function tick(dt) {
      if (!running || lives <= 0) return
      timer -= dt
      if (phase === 'wait' && timer <= 0) {
        phase = 'go'; ready = true; timer = Math.max(0.45, 0.95 - score * 0.03)
      } else if (phase === 'go' && timer <= 0) {
        ready = false; phase = 'wait'; timer = 0.8 + Math.random() * 1.4
      }
      if (flash !== 0) {
        flash *= 0.88
        if (Math.abs(flash) < 0.04) flash = 0
      }
    }

    function draw(now) {
      const g = ctx.createLinearGradient(0, 0, 0, H)
      g.addColorStop(0, '#22223b'); g.addColorStop(1, '#9a8c98')
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)

      const demoReady = !running && Math.sin(now / 450) > 0.4
      const go = running ? ready : demoReady
      const cx = W / 2, cy = H * 0.48
      const r = Math.min(W, H) * 0.18

      ctx.beginPath(); ctx.arc(cx, cy, r + 18, 0, Math.PI * 2)
      ctx.strokeStyle = go ? 'rgba(116,198,157,0.55)' : 'rgba(255,255,255,0.18)'
      ctx.lineWidth = 4; ctx.stroke()

      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2)
      ctx.fillStyle = go ? '#74c69d' : '#4a4e69'; ctx.fill()

      ctx.fillStyle = '#fff'
      ctx.font = `600 ${Math.floor(r * 0.28)}px sans-serif`
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
      ctx.fillText(go ? 'TAP' : 'WAIT', cx, cy)

      if (running) {
        for (let i = 0; i < 3; i++) {
          ctx.beginPath()
          ctx.arc(W / 2 - 28 + i * 28, H * 0.72, 8, 0, Math.PI * 2)
          ctx.fillStyle = i < lives ? '#fff' : 'rgba(255,255,255,0.25)'
          ctx.fill()
        }
      }

      if (flash > 0) {
        ctx.fillStyle = `rgba(116,198,157,${flash * 0.35})`
        ctx.fillRect(0, 0, W, H)
      } else if (flash < 0) {
        ctx.fillStyle = `rgba(230,57,70,${-flash * 0.35})`
        ctx.fillRect(0, 0, W, H)
      }
    }

    let last = performance.now()
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000)
      last = now
      tick(dt); draw(now)
      requestAnimationFrame(loop)
    }

    addEventListener('resize', resize)
    addEventListener('pointerdown', onTap)
    resize(); requestAnimationFrame(loop)
  </script>
</body>
</html>
