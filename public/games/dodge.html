<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Lane Shift</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1d3557; touch-action: manipulation; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud {
      position: fixed; top: 4.5rem; left: 0; right: 0; text-align: center;
      font: 800 2rem "Segoe UI", sans-serif; color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,.4); pointer-events: none;
    }
    .banner {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: rgba(15,20,25,.35); color: #fff; font: 600 1rem "Segoe UI", sans-serif;
      text-align: center; padding: 1rem;
    }
    .banner.hidden { display: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hud" id="score">0</div>
  <div class="banner" id="banner">Tap left or right<br/><small>to start & dodge</small></div>
  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')
    const scoreEl = document.getElementById('score')
    const banner = document.getElementById('banner')
    const dpr = Math.min(devicePixelRatio || 1, 2)
    const LANES = [0.22, 0.5, 0.78]
    let W = 0, H = 0, running = false, dead = false, score = 0
    let lane = 1, blocks = [], spawn = 0

    function resize() {
      W = innerWidth; H = innerHeight
      canvas.width = W * dpr; canvas.height = H * dpr
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0)
    }

    function reset() {
      score = 0; scoreEl.textContent = '0'
      lane = 1; blocks = []; spawn = 0.4; dead = false
    }

    function start(e) {
      const x = e.clientX / W
      if (!running) { running = true; banner.classList.add('hidden'); reset() }
      else if (dead) { reset(); banner.classList.add('hidden') }
      lane = x < 0.5 ? 0 : 2
    }

    function die() {
      dead = true
      banner.innerHTML = `Score ${score}<br/><small>Tap to retry</small>`
      banner.classList.remove('hidden')
    }

    function tick(dt) {
      if (!running || dead) return
      spawn -= dt
      if (spawn <= 0) {
        blocks.push({ lane: Math.floor(Math.random() * 3), y: -40 })
        spawn = Math.max(0.35, 0.85 - score * 0.02)
      }
      const py = H * 0.78
      blocks.forEach(b => { b.y += (210 + score * 6) * dt })
      blocks = blocks.filter(b => {
        if (b.y > H + 40) { score++; scoreEl.textContent = String(score); return false }
        if (b.lane === lane && Math.abs(b.y - py) < 38) { die(); return true }
        return true
      })
    }

    function draw(now) {
      const g = ctx.createLinearGradient(0, 0, W, H)
      g.addColorStop(0, '#1d3557'); g.addColorStop(1, '#e63946')
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H)

      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 2
      LANES.forEach(lx => {
        ctx.beginPath(); ctx.moveTo(W * lx, 90); ctx.lineTo(W * lx, H - 50); ctx.stroke()
      })

      if (!running) {
        const demoLane = 1 + Math.round(Math.sin(now / 500))
        blocks = blocks.length ? blocks : [{ lane: 0, y: H * 0.25 }, { lane: 2, y: H * 0.05 }]
        blocks.forEach(b => { b.y += 0.6; if (b.y > H) b.y = -40 })
        lane = Math.max(0, Math.min(2, demoLane))
      }

      blocks.forEach(b => {
        const x = W * LANES[b.lane]
        ctx.fillStyle = '#e63946'
        roundRect(x - 28, b.y - 18, 56, 36, 6); ctx.fill()
      })

      const px = W * LANES[lane]
      ctx.fillStyle = '#a8dadc'
      roundRect(px - 24, H * 0.78 - 24, 48, 48, 10); ctx.fill()
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.arcTo(x + w, y, x + w, y + h, r)
      ctx.arcTo(x + w, y + h, x, y + h, r)
      ctx.arcTo(x, y + h, x, y, r)
      ctx.arcTo(x, y, x + w, y, r)
      ctx.closePath()
    }

    let last = performance.now()
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000)
      last = now
      tick(dt); draw(now)
      requestAnimationFrame(loop)
    }

    addEventListener('resize', resize)
    addEventListener('pointerdown', start)
    resize(); requestAnimationFrame(loop)
  </script>
</body>
</html>
